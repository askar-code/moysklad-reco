spring:
  application:
    name: moysklad-recommendations

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/moysklad_reco}
    username: ${SPRING_DATASOURCE_USERNAME:moysklad_reco}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    ru.coproducts.moysklad.reco: DEBUG

moysklad:
  api:
    session-ttl-seconds: 28800
  json-api:
    base-url: https://api.moysklad.ru/api/remap/1.2
    connect-timeout-ms: 5000
    response-timeout-seconds: 30
    retry-max-attempts: 2
    retry-backoff-millis: 500
  vendor:
    base-url: https://apps-api.moysklad.ru/api/vendor/1.0
    app-uid: ${MOYSKLAD_VENDOR_APP_UID:your-app-uid}
    secret-key: ${VENDOR_SECRET_KEY:change-me}
    context-connect-timeout-ms: 5000
    context-response-timeout-seconds: 15
    context-retry-max-attempts: 2
    context-retry-backoff-millis: 500
